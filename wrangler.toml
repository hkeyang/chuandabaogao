name = "aisea-h5"
main = "worker/index.ts"
compatibility_date = "2026-05-05"

[assets]
directory = "./dist"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "aisea-production"
database_id = "replace-with-d1-database-id"

[[r2_buckets]]
binding = "R2"
bucket_name = "aisea-reports"

[vars]
PUBLIC_BASE_URL = "https://hair.aisea.space"
R2_PUBLIC_BASE_URL = "https://img.hair.aisea.space"
OPENAI_IMAGE_MODEL = "gpt-image-2"
OPENAI_IMAGE_ENDPOINT = "https://img.hair.aisea.space/v1/images/generations"
COUPON_VALID_DAYS = "30"
ADMIN_INITIAL_NAME = "AISea Owner"
